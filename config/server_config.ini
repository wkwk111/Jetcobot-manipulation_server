; ============================================================================
; 노트북 로컬 YOLO + 로봇팔 파지계획 설정
; ============================================================================
; 이 폴더 전체(models/, calibration/ 포함)를 노트북으로 복사한 뒤 사용합니다.
; 라즈베리파이는 SSH 터널 없이 노트북의 LAN IP와 아래 port로 접속합니다.
;
; 실행: 프로젝트 루트에서
;   python run_server.py
; ============================================================================

[server]
; 0.0.0.0: 노트북의 유선/LAN IP로 들어오는 라즈베리파이 요청을 수신합니다.
; 노트북 자체에서만 시험할 때는 127.0.0.1로 바꿀 수 있습니다.
host = 0.0.0.0
port = 8000

[model]
; 가중치는 프로젝트와 함께 배포합니다. 절대경로를 쓰지 마십시오.
model_path = models/best.pt
; 기본값은 호환성이 높은 CPU입니다.
; NVIDIA GPU를 노트북에서 사용할 경우 cuda:0으로 변경합니다.
device = cuda:0
; /detect 및 /grasp-plan 기본 confidence threshold
default_conf = 0.6
; YOLO 입력 해상도
default_imgsz = 640
; 비워 두면 모든 클래스 중 confidence 최고 검출을 사용합니다.
; 특정 클래스만 파지하려면 정확한 모델 클래스명을 적습니다. 예: eraser
default_target_label = 

[logging]
; true면 각 요청의 raw.jpg, annotated.jpg, result.json을 저장합니다.
save_results = true
; 로그 저장 경로 (프로젝트 기준 상대 경로 가능)
save_root_dir = laptop_detect_logs

[calibration]
; 카메라 intrinsic/왜곡 계수 파일 (프로젝트 기준 상대 경로 가능)
intrinsic_file = calibration/camera_intrinsic_charuco.npz
; Eye-in-Hand hand-eye 결과 JSON (프로젝트 기준 상대 경로 가능)
handeye_result_json = calibration/auto_handeye_result_20260619_162107.json
; 기존 MyCobot 좌표계와 동일해야 합니다. 현재 구현은 zyx만 지원합니다.
euler_order = zyx
; 물체가 놓인 테이블 표면의 Base Z [mm]
object_plane_z_base_mm = 0.0
; 표면보다 위쪽을 파지 목표로 삼을 경우의 추가 높이 [mm]
toothbrush_target_z_offset_mm = 0.0
; Flange 좌표계에서 TCP까지 offset [mm]: x, y, z
tcp_offset_flange_to_tcp_mm = -20.0, -20.0, 100.0

[request_validation]
; 최대 업로드 이미지 크기 [byte]
max_upload_bytes = 8388608
; 이 calibration 파일의 image_size는 640 x 480입니다.
; Pi 카메라도 반드시 이 해상도로 캡처해야 2D→3D 계산이 유지됩니다.
expected_image_width = 640
expected_image_height = 480
